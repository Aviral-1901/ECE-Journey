name: Run Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install iverilog
      run: sudo apt-get install -y iverilog

    - name: Create simulation directories
      run: mkdir -p sim/gates sim/combinational sim/arithmetic sim/sequential

    - name: Debug directories
      run: |
        pwd
        ls -la
        ls -la sim/
        ls -la sim/gates/
      
    - name: Run all tests
      run: make test